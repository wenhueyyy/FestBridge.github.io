<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>祝福语库</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="mini-body">
    <div class="page-container">
        <div class="header-bar">
            <div class="back-btn" onclick="location.href='home.html'">←</div>
            <h3 class="zh">祝福语库</h3>
            <h3 class="en hidden">Blessings</h3>
            <div class="header-actions">
                <div class="lang-switch">
                    <button class="lang-btn zh" onclick="switchLanguage('zh')">中</button>
                    <button class="lang-btn en" onclick="switchLanguage('en')">EN</button>
                </div>

        </div>

        </div>

                            'May all your wishes come true!',

                            'Success in career and wealth!'
                        ]
                    }

                'Mid-Autumn Festival': {

                        name: '中秋节',

                            '月圆人圆，事事圆满！',
                            '花好月圆，幸福美满！',
                            '月饼甜甜，好事连连！',
                            '中秋佳节，快乐无边！'
                        ]
                    },
                    en: {
                        name: 'Mid-Autumn Festival',
                        blessings: [
                            'Happy Mid-Autumn Festival!',
                            'Full moon, full family, full happiness!',

                            'Sweet mooncakes, sweet life!',
                            'Mid-Autumn Festival, endless joy!'

                    }

                'Dragon Boat Festival': {
                    zh: {
                        name: '端午节',

                            '端午安康，平安顺遂！',
                            '龙舟竞渡，气势如虹！',
                            '粽子飘香，幸福满溢！',
                            '端午佳节，吉祥如意！',
                            '身体健康，万事如意！'
                        ]
                    },
                    en: {
                        name: 'Dragon Boat Festival',
                        blessings: [

                            'Dragon boat racing, full of energy!',

                            'Dragon Boat Festival, good luck!',

                    }

                'Lantern Festival': {

                        name: '元宵节',

                            '元宵佳节，快乐无边！',
                            '月圆人圆，事事圆满！'
                        ]
                    },
                    en: {
                        name: 'Lantern Festival',
                        blessings: [
                            'Happy Lantern Festival!',
                            'Bright lanterns, happy life!',

                            'Winter Solstice is as important as New Year!',
                            'Warm winter, good health!'
                        ]
                    }
                },
                'Qingming Festival': {
                    zh: {

                            '清明安康，缅怀先人！',
                            '踏青赏花，心情愉悦！',
                            '扫墓祭祖，慎终追远！',
                            '清明时节，思念无限！',

                'Qixi Festival': {
                    zh: {
                        name: '七夕节',

                            '爱情甜蜜，幸福长久！',
                            '七夕佳节，浪漫无限！',
                            '愿得一人心，白首不相离！'
                        ]
                    },
                    en: {
                        name: 'Qixi Festival',
                        blessings: [
                            'Happy Qixi Festival!',
                            'Magpie bridge meeting, lovers unite!',
                            'Sweet love, long happiness!',
                            'Qixi Festival, endless romance!',
                            'May you find true love!'

                    }
                },
                'Double Ninth Festival': {
                    zh: {
                        name: '重阳节',
                        blessings: [
                            '重阳快乐，健康长寿！',
                            '登高望远，心旷神怡！',
                            '茱萸遍插，吉祥如意！',

                }
            };

            function loadBlessings() {
                const blessingsList = document.getElementById('blessingsList');
                const lang = localStorage.getItem('language') || 'zh';
                blessingsList.innerHTML = '';
                
                for (const [festival, data] of Object.entries(blessingsData)) {
                    const festivalInfo = data[lang];
                    
                    const section = document.createElement('div');
                    section.className = 'blessing-section';
                    section.innerHTML = `
                        <h4>${festivalInfo.name}</h4>
                        <div class="blessing-items">
                            ${festivalInfo.blessings.map(blessing => `
                                <div class="blessing-item">
                                    <p>${blessing}</p>
                                    <button class="copy-btn" onclick="copyBlessing('${blessing}')">📋</button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    blessingsList.appendChild(section);
                }
            }

            function copyBlessing(blessing) {
                navigator.clipboard.writeText(blessing).then(() => {
                    const lang = localStorage.getItem('language') || 'zh';
                    showToast(lang === 'zh' ? '已复制到剪贴板' : 'Copied to clipboard');
                });
            }

            window.onload = function() {
                updateLanguageDisplay();
                updateLanguageButtons();
                loadBlessings();
            };
        </script>
    </div>
</body>
</html>
