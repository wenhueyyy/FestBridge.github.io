            function loadBlessings() {
                const blessingsList = document.getElementById('blessingsList');
                const lang = localStorage.getItem('language') || 'zh';
                blessingsList.innerHTML = '';
                
                for (const [festival, data] of Object.entries(blessingsData)) {
                    const festivalInfo = data[lang];
                    
                    const section = document.createElement('div');
                    section.className = 'blessing-section';
                    section.innerHTML = `
                        <h4>${festivalInfo.name}</h4>
                        <div class="blessing-items">
                            ${festivalInfo.blessings.map(blessing => `
                                <div class="blessing-item">
                                    <p>${blessing}</p>
                                    <button class="copy-btn" onclick="copyBlessing('${blessing}')">📋</button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    blessingsList.appendChild(section);
                }
            }

            function copyBlessing(blessing) {
                navigator.clipboard.writeText(blessing).then(() => {
                    const lang = localStorage.getItem('language') || 'zh';
                    showToast(lang === 'zh' ? '已复制到剪贴板' : 'Copied to clipboard');
                });
            }

            window.onload = function() {
                updateLanguageDisplay();
                updateLanguageButtons();
                loadBlessings();
