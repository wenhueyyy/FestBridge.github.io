<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="mini-body">
    <div class="page-container">
        <div class="header-bar">
            <div class="back-btn" onclick="location.href='index.html'">←</div>
            <h3>登录</h3>
            <div class="header-actions">
                <div class="lang-switch">
                    <button class="lang-btn zh" onclick="switchLanguage('zh')">中</button>
                    <button class="lang-btn en" onclick="switchLanguage('en')">EN</button>
                </div>
            </div>
        </div>
        
        <div class="login-container">
            <h2>欢迎</h2>
            <input type="text" id="username" class="login-input" placeholder="你的名字">
            <input type="password" id="pwd" class="login-input" placeholder="密码（任意）">
            <button class="login-btn" onclick="doLogin()">
                <span>登录</span>
            </button>
            <div class="login-divider">
                <span class="divider-text">OR</span>
            </div>
            <button class="wechat-login-btn" onclick="wechatLogin()">
                <span class="wechat-icon"></span>
                <span>微信一键登录</span>
            </button>
            <div class="tip" id="tip"></div>
        </div>
        <script src="js/app.js"></script>
    </div>
</body>
</html>
