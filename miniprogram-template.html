<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>小程序风格页面模板</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* rem 适配方案 */
        html {
            font-size: 26.6667vw; /* 1rem = 100px 在375宽下 */
        }
        
        body {
            font-size: 0.14rem; /* 相当于14px */
            width: 100%;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
        }
        
        /* 页面容器 */
        .container {
            width: 100%;
            max-width: 375px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            position: relative;
        }
        
        /* 头部 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.16rem 0.2rem;
            background: white;
            box-shadow: 0 0.02rem 0.08rem rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-left {
            font-size: 0.2rem;
            color: #333;
        }
        
        .header-title {
            font-size: 0.18rem;
            font-weight: 600;
            color: #333;
        }
        
        .header-right {
            font-size: 0.16rem;
            color: #333;
        }
        
        /* 内容区域 */
        .content {
            padding: 0.2rem;
        }
        
        /* 卡片 */
        .card {
            background: white;
            border-radius: 0.16rem;
            box-shadow: 0 0.04rem 0.15rem rgba(0,0,0,0.08);
            padding: 0.2rem;
            margin-bottom: 0.2rem;
        }
        
        /* 按钮 */
        .btn {
            width: 100%;
            padding: 0.16rem;
            border: none;
            border-radius: 0.16rem;
            font-size: 0.16rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 0.15rem;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #C9373A, #E54A4D);
            color: white;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        /* 输入框 */
        .input {
            width: 100%;
            padding: 0.16rem;
            border: 0.02rem solid #e0e0e0;
            border-radius: 0.16rem;
            font-size: 0.16rem;
            margin-bottom: 0.15rem;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .input:focus {
            border-color: #C9373A;
            box-shadow: 0 0 0 0.03rem rgba(201, 55, 58, 0.1);
        }
        
        /* 列表 */
        .list {
            background: white;
            border-radius: 0.16rem;
            overflow: hidden;
            box-shadow: 0 0.04rem 0.15rem rgba(0,0,0,0.08);
        }
        
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.16rem 0.2rem;
            border-bottom: 0.01rem solid #f0f0f0;
        }
        
        .list-item:last-child {
            border-bottom: none;
        }
        
        /* 图标 */
        .icon {
            font-size: 0.24rem;
            margin-right: 0.15rem;
        }
        
        /* 文本样式 */
        .text-center {
            text-align: center;
        }
        
        .text-primary {
            color: #C9373A;
        }
        
        .text-gray {
            color: #999;
        }
        
        /* 间距 */
        .mt-10 {
            margin-top: 0.1rem;
        }
        
        .mb-10 {
            margin-bottom: 0.1rem;
        }
        
        /* 响应式调整 */
        @media (max-width: 375px) {
            .container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-left">←</div>
            <div class="header-title">页面标题</div>
            <div class="header-right">...</div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <!-- 卡片 -->
            <div class="card">
                <h3 style="font-size: 0.18rem; margin-bottom: 0.15rem; color: #333;">卡片标题</h3>
                <p style="font-size: 0.14rem; line-height: 1.5; color: #666;">这是卡片内容，包含一些文字描述。</p>
            </div>
            
            <!-- 输入框 -->
            <input type="text" class="input" placeholder="请输入内容">
            <input type="password" class="input" placeholder="请输入密码">
            
            <!-- 按钮 -->
            <button class="btn btn-primary">主要按钮</button>
            <button class="btn btn-secondary">次要按钮</button>
            
            <!-- 列表 -->
            <div class="list">
                <div class="list-item">
                    <div style="display: flex; align-items: center;">
                        <span class="icon">📅</span>
                        <span>项目一</span>
                    </div>
                    <span style="color: #999;">→</span>
                </div>
                <div class="list-item">
                    <div style="display: flex; align-items: center;">
                        <span class="icon">🎯</span>
                        <span>项目二</span>
                    </div>
                    <span style="color: #999;">→</span>
                </div>
                <div class="list-item">
                    <div style="display: flex; align-items: center;">
                        <span class="icon">⚙️</span>
                        <span>项目三</span>
                    </div>
                    <span style="color: #999;">→</span>
                </div>
            </div>
            
            <!-- 文本 -->
            <div class="mt-10 text-center">
                <p class="text-primary" style="font-size: 0.16rem; font-weight: 600;">重要文本</p>
                <p class="text-gray mt-10">辅助文本</p>
            </div>
        </div>
    </div>
    
    <script>
        // 示例：处理按钮点击事件
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function() {
                alert('按钮被点击！');
            });
        });
        
        // 示例：处理列表项点击事件
        document.querySelectorAll('.list-item').forEach(item => {
            item.addEventListener('click', function() {
                const text = this.querySelector('span:not(.icon)').textContent;
                alert(`点击了：${text}`);
            });
        });
    </script>
</body>
</html>
