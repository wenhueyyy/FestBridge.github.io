<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>热门节日</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="mini-body">
    <div class="page-container">
        <div class="header-bar">
            <div class="back-btn" onclick="location.href='home.html'">←</div>
            <h3 class="zh">热门节日</h3>
            <h3 class="en hidden">Popular</h3>
            <div class="header-actions">
                <div class="lang-switch">
                    <button class="lang-btn zh" onclick="switchLanguage('zh')">中</button>
                    <button class="lang-btn en" onclick="switchLanguage('en')">EN</button>
                </div>
            </div>
        </div>

        <div class="popular-container" id="popularList">
        </div>
        <script src="js/app.js"></script>
        <script>
            function loadPopularFestivals() {
                const popularFestivals = [
                    { name: 'Spring Festival', zh: '春节', en: 'Spring Festival', reasonZh: '中国最重要的传统节日', reasonEn: 'Most important traditional festival in China', icon: '🧧' },
                    { name: 'Mid-Autumn Festival', zh: '中秋节', en: 'Mid-Autumn Festival', reasonZh: '团圆的节日', reasonEn: 'Festival of reunion', icon: '🥮' },
                    { name: 'Dragon Boat Festival', zh: '端午节', en: 'Dragon Boat Festival', reasonZh: '纪念屈原', reasonEn: 'Commemorate Qu Yuan', icon: '🐲' },
                    { name: 'Lantern Festival', zh: '元宵节', en: 'Lantern Festival', reasonZh: '春节的结束', reasonEn: 'End of Spring Festival', icon: '🏮' }
                ];
                
                const popularList = document.getElementById('popularList');
                const lang = localStorage.getItem('language') || 'zh';
                popularList.innerHTML = '';
                
                popularFestivals.forEach((festival, index) => {
                    const festivalName = festival[lang];
                    const reason = lang === 'zh' ? festival.reasonZh : festival.reasonEn;
                    
                    const item = document.createElement('div');
                    item.className = 'popular-item';
                    item.onclick = () => goDetail(festival.name);
                    item.innerHTML = `
                        <div class="popular-rank">${index + 1}</div>
                        <div class="popular-icon">${festival.icon}</div>
                        <div class="popular-info">
                            <h4>${festivalName}</h4>
                            <p>${reason}</p>
                        </div>
                    `;
                    popularList.appendChild(item);
                });
            }

            window.onload = function() {
                updateLanguageDisplay();
                updateLanguageButtons();
                loadPopularFestivals();
            };
        </script>
    </div>
</body>
</html>
